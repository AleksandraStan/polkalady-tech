<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Alexandra Stan | Digital Horizons</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
*{box-sizing:border-box}html{background:#020316;scroll-behavior:smooth}body{margin:0;color:#f8f7ff;font-family:Inter,sans-serif;background:#020316}.hero{position:relative;background:radial-gradient(circle at 70% 20%,rgba(14,117,180,.24),transparent 34%),#020316}.copy{position:absolute;z-index:2;top:8vh;left:50%;width:min(740px,84vw);transform:translateX(-50%);text-align:center;pointer-events:none}.kicker,.closing p{margin:0 0 14px;color:#5ce1ff;font-size:11px;font-weight:600;letter-spacing:.28em;text-transform:uppercase}h1,h2{margin:0;font-family:'Space Grotesk',sans-serif;letter-spacing:-.06em}h1{font-size:clamp(42px,6vw,84px);line-height:.98}.description{max-width:510px;margin:20px auto 0;color:rgba(238,239,255,.72);font-size:clamp(14px,1.4vw,17px);line-height:1.7}.scroll-hero{position:relative;width:100%;height:calc(1500px + 100vh)}.sticky{position:sticky;top:0;height:100vh;width:100%;overflow:hidden;background:#020316;will-change:clip-path}.image{position:absolute;inset:0;background-image:url('https://github.com/user-attachments/assets/d62e2022-cc17-41d5-b409-87a03fc5a58d');background-position:center;background-repeat:no-repeat}.cue{position:absolute;z-index:2;top:91vh;left:50%;display:grid;justify-items:center;gap:9px;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase}.cue i{width:1px;height:30px;background:linear-gradient(#66e8ff,transparent)}.closing{display:grid;min-height:72vh;place-content:center;padding:10vw;text-align:center;background:radial-gradient(circle at 50% 0%,rgba(47,8,113,.6),transparent 50%),#020316}h2{font-size:clamp(44px,7vw,104px);line-height:.95}@media(max-width:767px){.copy{top:7vh}.description{max-width:340px}}
</style>
</head>
<body><main><section class="hero"><div class="copy"><p class="kicker">Digital Horizons</p><h1>Building ideas beyond the ordinary.</h1><p class="description">Scroll to explore a world shaped by technology, curiosity, and imagination.</p></div><div class="scroll-hero"><div class="sticky"><div class="image"></div></div></div><div class="cue"><span>Scroll to reveal</span><i></i></div></section><section class="closing"><p>Alexandra Stan</p><h2>Explore. Create. Connect.</h2></section></main>
<script>const sticky=document.querySelector('.sticky'),image=document.querySelector('.image');function reveal(){const p=Math.min(Math.max(scrollY/1500,0),1),start=25-p*25,end=75+p*25;sticky.style.clipPath=`polygon(${start}% ${start}%,${end}% ${start}%,${end}% ${end}%,${start}% ${end}%)`;image.style.backgroundSize=(170-p*70)+'%'}addEventListener('scroll',reveal,{passive:true});reveal();</script></body></html>
